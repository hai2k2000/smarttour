services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smarttour
      POSTGRES_PASSWORD: smarttour_dev_password
      POSTGRES_DB: smarttour
    ports:
      - "5433:5432"
    volumes:
      - smarttour_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: smarttour
      MINIO_ROOT_PASSWORD: smarttour_dev_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - smarttour_minio:/data

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    volumes:
      - smarttour_n8n:/home/node/.n8n
    environment:
      N8N_DIAGNOSTICS_ENABLED: "false"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://smarttour:smarttour_dev_password@postgres:5432/smarttour?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
    ports:
      - "3000:3000"
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

volumes:
  smarttour_postgres:
  smarttour_minio:
  smarttour_n8n:
