services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smarttour
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: smarttour
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - smarttour_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6380:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - smarttour_minio:/data

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - smarttour_n8n:/home/node/.n8n
    environment:
      N8N_DIAGNOSTICS_ENABLED: "false"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://smarttour:${POSTGRES_PASSWORD}@postgres:5432/smarttour?schema=public
      REDIS_URL: redis://redis:6379
      SMARTTOUR_AUTH_ENFORCE: ${SMARTTOUR_AUTH_ENFORCE:-true}
      SMARTTOUR_BOOTSTRAP_KEY: ${SMARTTOUR_BOOTSTRAP_KEY:-}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-smarttour}
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      - postgres
      - redis
      - minio

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://quanly.dunientravel.com}
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://quanly.dunientravel.com}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
      - api

volumes:
  smarttour_postgres:
  smarttour_minio:
  smarttour_n8n:
