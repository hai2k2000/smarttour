log_format smarttour '$remote_addr|host=$host|server=$server_name|time=$time_iso8601|status=$status|request=$request|ref=$http_referer|ua=$http_user_agent|xff=$http_x_forwarded_for';

limit_req_zone $binary_remote_addr zone=smarttour_login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=smarttour_api:10m rate=120r/m;
limit_req_status 429;
limit_req_log_level warn;
server_tokens off;

server {
  access_log /var/log/nginx/access.log smarttour;
  listen 80 default_server;
  server_name _;
  return 444;
}

server {
  access_log /var/log/nginx/access.log smarttour;
  listen 443 ssl default_server;
  server_name _;
  ssl_reject_handshake on;
}

server {
  access_log /var/log/nginx/access.log smarttour;
  listen 80;
  server_name aitour.io.vn;
  return 301 https://$host$request_uri;
}

server {
  access_log /var/log/nginx/access.log smarttour;
  listen 443 ssl;
  server_name aitour.io.vn;

  ssl_certificate /etc/letsencrypt/live/aitour.io.vn/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/aitour.io.vn/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  add_header Strict-Transport-Security "max-age=31536000" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location = /api/auth/login {
    limit_req zone=smarttour_login burst=5 nodelay;
    proxy_pass http://api:4000/api/auth/login;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    limit_req zone=smarttour_api burst=60 nodelay;
    proxy_pass http://api:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /docs {
    proxy_pass http://api:4000/docs;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location / {
    proxy_pass http://web:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
